# Hand-curated query bank for `memorize-eval code-eval`.
#
# Each entry has:
#   query     — what we'd type into code recall
#   expect    — one or more path substrings; any match in top-K counts as recall
#   category  — short tag for per-bucket roll-ups
#   path_prefix (optional) — restrict the search to this prefix; mirrors what
#                            production code_recall does when scope=current.
#
# Roughly grouped by query style. Add freely.

# ---------- Symbol queries (single identifier, often camelCase) ----------

[[queries]]
query = "snapshotMemoGraph"
expect = ["/irMemo/memo.ts"]
category = "symbol"

[[queries]]
query = "getMemoDebug"
expect = ["/irMemo/memo.ts", "/workbook/fetch/cache.ts", "/workbook/fetch/baseFetchManager.ts"]
category = "symbol"

[[queries]]
query = "fused_code_search"
expect = ["memorize-recall/src/code.rs"]
category = "symbol"

[[queries]]
query = "split_to_token_cap"
expect = ["memorize-embed/src/lib.rs"]
category = "symbol"

[[queries]]
query = "enforce_token_cap"
expect = ["memorize-server/src/code_indexer.rs", "memorize-cli/src/bench.rs"]
category = "symbol"

[[queries]]
query = "upsert_code_file"
expect = ["memorize-store/src/store.rs"]
category = "symbol"

[[queries]]
query = "mkCacheKeyFromQueryPlan"
expect = ["/workbook/fetch/cache.ts"]
category = "symbol"

# ---------- Path-style queries ----------

[[queries]]
query = "irMemo/memo.ts"
